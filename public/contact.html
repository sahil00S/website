<!DOCTYPE html>
<html>
<head>

<title>Contact Us</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.contact-box{

position:relative;
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
z-index:2;

}

h1{
text-align:center;
margin-bottom:20px;
}

input,textarea{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
background:#1e90ff;
color:white;
border:none;
border-radius:6px;
font-weight:bold;

}

button:hover{

background:#0066cc;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="contact-box">

<h1>Contact Us</h1>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email">

<textarea placeholder="Message"></textarea>

<button>Send Message</button>

</div>

</body>
</html>
