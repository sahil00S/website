<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover no-repeat;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.container{

position:relative;
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
z-index:2;

}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
background:#1e90ff;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#0066cc;

}

.toggle{
text-align:center;
margin-top:10px;
color:#1e90ff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1 id="title">Register</h1>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>


<form id="loginForm" style="display:none;">

<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="toggle" id="toggleBtn">Already have account? Login</div>

</div>


<script>

const toggle=document.getElementById("toggleBtn");
const register=document.getElementById("registerForm");
const login=document.getElementById("loginForm");
const title=document.getElementById("title");

toggle.onclick=()=>{

if(register.style.display!=="none"){

register.style.display="none";
login.style.display="block";
title.innerText="Login";
toggle.innerText="New user? Register";

}else{

register.style.display="block";
login.style.display="none";
title.innerText="Register";
toggle.innerText="Already have account? Login";

}

};


/* REGISTER */

register.addEventListener("submit",async(e)=>{

e.preventDefault();

const data={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value

};

const res=await fetch("/register",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

});

const result=await res.json();

alert(result.message);

});


/* LOGIN */

login.addEventListener("submit",async(e)=>{

e.preventDefault();

const data={

email:document.getElementById("loginEmail").value,
password:document.getElementById("loginPassword").value

};

const res=await fetch("/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

});

const result=await res.json();

if(result.message==="Login successful"){

window.location.href="booking.html";

}else{

alert(result.message);

}

});

</script>

</body>
</html>
